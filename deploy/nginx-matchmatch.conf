# nginx reverse-proxy для MatchMatch-бота.
# Кладётся в /etc/nginx/sites-available/matchmatch, симлинк в sites-enabled.
# certbot --nginx после установки сам добавит блок listen 443 ssl + сертификат
# и редирект 80→443. Хостнейм — sslip.io от IP сервера (валидный Let's Encrypt cert).

server {
    listen 80;
    server_name 64-188-119-94.sslip.io;

    # Секрет вебхука присутствует в URL → НЕ логируем полный путь (иначе утечёт в access.log).
    location /webhook/ {
        access_log off;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Вебхуки шлют лёгкий JSON (content_uri, не сами фото) — большой body не нужен.
    client_max_body_size 2m;
}
